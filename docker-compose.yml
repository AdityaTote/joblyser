services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:?Set RABBITMQ_DEFAULT_USER in .env}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:?Set RABBITMQ_DEFAULT_PASS in .env}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - backend_net

  chroma:
    image: chromadb/chroma:1.5.5
    container_name: chroma
    restart: unless-stopped
    volumes:
      - chroma_data:/data
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8000'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - backend_net

  mongodb:
    image: mongo:7
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?Set MONGO_INITDB_ROOT_USERNAME in .env}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?Set MONGO_INITDB_ROOT_PASSWORD in .env}
    volumes:
      - mongodb_data:/data/db
    networks:
      - backend_net

  postgres:
    image: postgres:15
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-joblyser}
    ports:
      - "${POSTGRES_BIND_HOST:-127.0.0.1}:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-joblyser}",
        ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - backend_net

  migrate:
    image: migrate/migrate:v4.18.3
    container_name: migrate
    volumes:
      - ./migrations:/migrations
    command:
      [
        "-path",
        "/migrations",
        "-database",
        "postgres://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@${POSTGRES_HOST:-postgres}:${POSTGRES_PORT:-5432}/${POSTGRES_DB:-joblyser}?sslmode=${POSTGRES_SSLMODE:-disable}",
        "up",
      ]
    depends_on:
      postgres:
        condition: service_healthy
    restart: on-failure
    networks:
      - backend_net

  worker:
    build:
      context: .
      dockerfile: docker/worker.dockerfile
    container_name: worker
    env_file:
      - agent-worker/.env
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_started
      chroma:
        condition: service_healthy
    networks:
      - backend_net

  ai:
    build:
      context: .
      dockerfile: docker/ai.dockerfile
    container_name: ai
    env_file:
      - joblyser-ai/.env
    restart: unless-stopped
    depends_on:
      migrate:
        condition: service_completed_successfully
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
      rabbitmq:
        condition: service_started
      chroma:
        condition: service_healthy
      worker:
        condition: service_started
    environment:
      HOST: 0.0.0.0
      PORT: 8080
      RELOAD: "false"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8080/ready'', timeout=3)"',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - backend_net

  api:
    build:
      context: .
      dockerfile: docker/api.dockerfile
    container_name: api
    env_file:
      - joblyser-api/.env
    restart: unless-stopped
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:8081:8081"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      worker:
        condition: service_started
      ai:
        condition: service_healthy
    networks:
      - backend_net

  web:
    build:
      context: .
      dockerfile: docker/web.dockerfile
    container_name: web
    restart: unless-stopped
    ports:
      - "${WEB_BIND_HOST:-127.0.0.1}:3000:3000"
    depends_on:
      api:
        condition: service_started
    networks:
      - backend_net

volumes:
  postgres_data:
  mongodb_data:
  chroma_data:
  rabbitmq_data:

networks:
  backend_net:
